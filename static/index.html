<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Risk Engine | Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #0f172a; color: white; }
        #map { height: 500px; border-radius: 12px; }
        #options-list button {
            animation: slideIn 0.3s ease-out forwards;
            opacity: 0;
        }

        @keyframes slideIn {
            from { transform: translateX(-10px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #risk-badge {
            transition: all 0.5s ease;
        }
    </style>
</head>
<body class="p-8">
    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-[9999] flex items-center justify-center">
        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl w-96">
            <h2 class="text-2xl font-bold mb-6 text-center">Logistics Command</h2>
            <input type="password" id="pass-input" placeholder="Enter Access Key" class="w-full p-3 mb-4 rounded bg-slate-700 border border-slate-600 outline-none focus:border-blue-500 text-white">
            <button onclick="checkPass()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition text-white">Access System</button>
            <p id="login-error" class="text-red-500 text-sm mt-3 hidden text-center">Invalid Credentials</p>
        </div>
    </div>

    <div class="max-w-full mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">Anticipatory Risk Engine</h1>
            <div id="connection-status" class="px-3 py-1 bg-green-900 text-green-400 rounded-full text-sm">● Live Data</div>
        </header>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h2 class="text-xl mb-4 font-semibold">Active Shipments</h2>
                <div id="shipment-list" class="space-y-4">
                    <div class="p-4 bg-slate-700 rounded-lg border border-slate-600">
                        <p class="text-sm text-slate-400">ID: SHP-SUEZ-001</p> 
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-white">Suez Transit</span>
                            <span id="risk-badge" class="text-blue-400 font-mono text-lg">WAITING...</span>
                        </div>
                        
                        <div id="route-options-container" class="mt-4 space-y-2 hidden">
                            <p class="text-xs text-blue-300 uppercase font-bold">Select AI Strategy:</p>
                            <div id="options-list" class="grid grid-cols-1 gap-2"></div>
                        </div>

                        <button onclick="approveReroute()" id="approve-btn" class="mt-3 w-full bg-blue-600 hover:bg-blue-500 py-2 rounded font-bold transition text-white hidden">Approve Selected Route</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="map"></div>
                <div id="ai-status-box" class="mt-4 p-4 bg-slate-800 border-l-4 border-blue-500 rounded text-sm italic text-slate-300">
                    Scanning route for potential disruptions...
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script>
        var currentOptions = {}; 
        var routeLine = null;
        var heatLayer = null;
        var map = L.map('map').setView([30.58, 32.33], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Define a custom ship icon
        var shipIcon = L.divIcon({
            html: `<div style="font-size: 24px;">🚢</div>`,
            className: 'ship-marker',
            iconSize: [30, 30]
        });

        var currentMarker = L.marker([30.58, 32.33], {icon: shipIcon}).addTo(map)
            .bindPopup("<b>Vessel:</b> EVER-GIVEN-02<br><b>Status:</b> En Route");    
        // Variable to store the route line so we can remove it later
        var routeLine = null;

        function approveReroute() {
            alert("Reroute Approved. AI instruction sent to vessel.");
        }

        async function getAIRiskUpdate() {
            try {
                const response = await fetch('https://risk-engine-3.onrender.com', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        shipment_id: "SHP-SUEZ-001",
                        current_lat: 30.58,
                        current_lon: 32.33,
                        dest_lat: 12.78,
                        dest_lon: 45.01
                    })
                });

                // Check if the server actually sent a 200 OK
                if (!response.ok) {
                    console.error("HTTP Error:", response.status);
                    return;
                }

                const data = await response.json();
                
                // --- CRITICAL DEBUG LINE ---
                console.log("RAW DATA FROM SERVER:", data); 
                
                updateUI(data);
            } catch (error) {
                console.error("Fetch failed:", error);
            }
        }

        function checkPass() {
            const pass = document.getElementById('pass-input').value;
            if(pass === "123") {
                document.getElementById('login-overlay').classList.add('hidden');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function updateUI(data) {
            const badge = document.getElementById('risk-badge');
            const statusBox = document.getElementById('ai-status-box');
            const optionsContainer = document.getElementById('route-options-container');
            const optionsList = document.getElementById('options-list');
            const approveBtn = document.getElementById('approve-btn');
            
            badge.innerText = `${data.risk_score}% RISK`;

            if(data.risk_score > 70) {
                badge.className = "text-red-500 font-bold animate-pulse text-lg";
                statusBox.innerText = `AI Alert: ${data.action}. Multiple bypass strategies generated.`;
                statusBox.className = "mt-4 p-4 bg-slate-800 border-l-4 border-red-500 rounded text-sm italic text-red-200";
                
                // Show options UI
                optionsContainer.classList.remove('hidden');
                approveBtn.classList.remove('hidden');
                
                // Store options globally
                currentOptions = data.route_options;
                
                // Clear and rebuild buttons with advantages
                optionsList.innerHTML = '';
                Object.keys(currentOptions).forEach(key => {
                    const opt = currentOptions[key];
                    const btn = document.createElement('button');
                    
                    // Richer button design to show advantages
                    btn.className = "flex flex-col text-left px-4 py-3 bg-slate-600 hover:bg-blue-900 rounded-lg transition border border-slate-500 text-white group";
                    btn.innerHTML = `
                        <div class="flex justify-between items-center w-full">
                            <span class="font-bold text-blue-300">➔ ${key.replace('_', ' ')}</span>
                            <span class="text-xs font-mono bg-slate-800 px-2 py-1 rounded text-slate-300">${opt.eta_impact}</span>
                        </div>
                        <span class="text-xs text-slate-400 mt-1 group-hover:text-slate-200">${opt.advantage}</span>
                    `;
                    
                    btn.onclick = () => drawSelectedRoute(key);
                    optionsList.appendChild(btn);
                });
            } else {
                // Safe mode logic
                badge.className = "text-green-400 font-mono text-lg";
                statusBox.innerText = "Path clear. No immediate disruptions predicted.";
                statusBox.className = "mt-4 p-4 bg-slate-800 border-l-4 border-green-500 rounded text-sm italic text-green-200";
                optionsContainer.classList.add('hidden');
                approveBtn.classList.add('hidden');
                if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
            }
            // 1. Heatmap Polish: Visualize the "Conflict/Storm" Zone
            

            // HEATMAP LOGIC
            if (heatLayer) {
                map.removeLayer(heatLayer);
            }

            // Only draw if risk is above 20%
            if (data.risk_score > 20) {
                console.log("Drawing heatmap with intensity:", data.risk_score);
                
                // Intensity should be a number between 0 and 1
                const intensity = data.risk_score / 100;

                // Points around Suez: [lat, lng, intensity]
                const heatPoints = [
                    [30.58, 32.33, intensity],
                    [30.65, 32.45, intensity * 0.8],
                    [30.50, 32.20, intensity * 0.8],
                    [30.80, 32.60, intensity * 0.5],
                    [30.30, 32.10, intensity * 0.5]
                ];

                heatLayer = L.heatLayer(heatPoints, {
                    radius: 50,      // Higher radius = bigger glow
                    blur: 30,        // Higher blur = smoother edges
                    maxZoom: 1,      // Forces it to be visible even when zoomed out
                    max: 1.0,        // Max intensity reference
                    gradient: {
                        0.2: 'blue', 
                        0.4: 'cyan', 
                        0.6: 'lime', 
                        0.8: 'yellow', 
                        1.0: 'red'
                    }
                }).addTo(map);
            }
        
        }

        // Function to draw the specific route the human clicks
        function drawSelectedRoute(type) {
            if (routeLine) { map.removeLayer(routeLine); }
            
            // Access opt.path instead of just the object
            const pathData = currentOptions[type].path; 
            const latlngs = pathData.map(p => [p.lat, p.lng]);
            
            routeLine = L.polyline(latlngs, {
                color: '#22d3ee', 
                weight: 6, 
                dashArray: '10, 10',
                opacity: 0.9
            }).addTo(map);
            
            map.fitBounds(routeLine.getBounds(), {padding: [40, 40]});
        }
        // Start checking for updates immediately, then every 10 seconds
        getAIRiskUpdate();
        setInterval(getAIRiskUpdate, 10000);
    </script>
</body>
</html>
